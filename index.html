<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miller's Planet | Time Dilation</title>
    <style>
        :root { 
            --accent: #4cc9f0; 
            --danger: #ff4d4d;
            --bg: #05070a; 
            --card-bg: rgba(10, 12, 18, 0.95);
        }
        body {
            background-color: var(--bg);
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        .gargantua {
            width: 100px;
            height: 100px;
            background: #000;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            position: relative;
            box-shadow: 0 0 15px #fff, 0 0 30px var(--accent), 0 0 50px #f0a500;
        }
        .accretion-disk {
            position: absolute;
            top: 50%;
            left: -25%;
            width: 150%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f0a500, #fff, #f0a500, transparent);
            transform: translateY(-50%) rotate(-5deg);
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0vh; 
            background: linear-gradient(to top, #1a3a4a 0%, #0a1e29 70%, transparent 100%);
            transition: height 1.25s linear;
            z-index: 1;
            border-top: 2px solid var(--accent);
            opacity: 0.5;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border: 1px solid #333;
            text-align: center;
            box-shadow: 0 0 60px rgba(0,0,0,1);
            width: 90%;
            max-width: 450px;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        h1 { color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin: 0; font-size: 1.2rem; }
        .subtitle { font-size: 0.6rem; color: #555; margin-bottom: 20px; letter-spacing: 2px; }
        
        label { display: block; text-align: left; font-size: 0.55rem; color: #888; text-transform: uppercase; margin: 10px 0 5px 0; }
        
        input, select {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #444;
            color: var(--accent);
            font-size: 0.85rem;
            margin-bottom: 5px;
            outline: none;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #222;
        }

        #activityTag { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; }
        #millerTime { font-size: 2rem; color: #fff; display: block; font-weight: bold; margin: 5px 0; }

        .btn-mission {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            margin-bottom: 10px;
        }

        .ticker-group {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #222;
        }

        .ticker-val { display: block; font-size: 0.9rem; color: var(--danger); font-weight: bold; }
        .ticker-label { font-size: 0.5rem; color: #666; text-transform: uppercase; }

        #messageLog { height: 35px; margin-top: 10px; font-size: 0.7rem; color: #eee; font-style: italic; }
    </style>
</head>
<body>

    <div class="wave" id="mountainWave"></div>

    <div class="container">
        <div class="gargantua"><div class="accretion-disk"></div></div>
        <h1>MILLER'S TRACKER</h1>
        <p class="subtitle">GRAVITATIONAL TIME DILATION: 61,320X</p>
        
        <button class="btn-mission" id="startBtn" onclick="initiateMission()">Initiate Landing Sequence</button>

        <label>Activity Name</label>
        <input type="text" id="customTask" placeholder="e.g. Brushing Teeth" oninput="calculate()">

        <label>Time on Earth (Minutes)</label>
        <select id="taskSelect" onchange="updateFromPreset()">
            <option value="custom">-- Manual Input --</option>
            <option value="15">Coffee Break (15m)</option>
            <option value="480">8hr Work Day (480m)</option>
            <option value="1440">Full Earth Day (1440m)</option>
        </select>
        <input type="number" id="earthInput" placeholder="Enter minutes..." oninput="calculate()">

        <div class="result-box">
            <div id="activityTag">Awaiting Mission...</div>
            <label>Time on Miller's</label>
            <span id="millerTime">0.0000s</span>
            
            <div class="ticker-group">
                <div class="ticker-item" style="flex:1">
                    <span class="ticker-val" id="dayCounter">0</span>
                    <span class="ticker-label">Days Lost</span>
                </div>
                <div class="ticker-item" style="flex:1">
                    <span class="ticker-val" id="yearCounter">0.00</span>
                    <span class="ticker-label">Years Lost</span>
                </div>
            </div>
            <div id="messageLog">Comms Offline</div>
        </div>
    </div>

    <script>
        const RATIO = 61320; 
        // Cinematic "Woodblock" style click
        const clickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        
        const messages = [
            "Today's my birthday...", "I'm the same age now as you were.", "Grandpa died today.", 
            "The dust is getting worse.", "I'm letting you go, Dad.", "Brand is still waiting."
        ];

        let earthDays = 0;
        let lastYearMark = 0;
        let waveHeight = 0;

        function initiateMission() {
            document.getElementById('startBtn').style.display = 'none';
            
            // The 1.25s interval matches the movie's 60 BPM (approx) soundtrack timing
            setInterval(() => {
                clickSound.currentTime = 0;
                clickSound.play().catch(e => {}); 
                
                earthDays++;
                const years = (earthDays / 365.25);
                
                document.getElementById('dayCounter').innerText = earthDays;
                document.getElementById('yearCounter').innerText = years.toFixed(2);
                
                if (Math.floor(years) > lastYearMark) {
                    lastYearMark = Math.floor(years);
                    document.getElementById('messageLog').innerText = `"${messages[Math.floor(Math.random() * messages.length)]}"`;
                }

                waveHeight += 0.85; 
                if (waveHeight > 90) waveHeight = 90; 
                document.getElementById('mountainWave').style.height = waveHeight + 'vh';
            }, 1250); 
        }

        function updateFromPreset() {
            const val = document.getElementById('taskSelect').value;
            if (val !== "custom") {
                document.getElementById('earthInput').value = val;
                calculate();
            }
        }

        function calculate() {
            const mins = document.getElementById('earthInput').value;
            const task = document.getElementById('customTask').value || "Current Task";
            document.getElementById('activityTag').innerText = task;

            if (!mins || mins <= 0) { document.getElementById('millerTime').innerText = "0.0000s"; return; }
            const millerSecs = (mins / (RATIO * 60)) * 3600;
            document.getElementById('millerTime').innerText = millerSecs < 60 ? millerSecs.toFixed(4) + "s" : (millerSecs / 60).toFixed(2) + "m";
        }
    </script>
</body>
</html>
