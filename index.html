<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARGANTUA_OS // V.07</title>
    <style>
        :root { 
            --neon-blue: #00f3ff; --neon-pink: #ff0055; --terminal-green: #00ff41; --bg: #020205; 
        }
        
        body {
            background-color: var(--bg); color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; margin: 0;
            overflow: hidden; position: relative;
        }

        /* CRT Scanline Effect */
        body::before {
            content: " "; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; z-index: 100; pointer-events: none;
        }

        /* Deep Water Wave Logic */
        .wave-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 0vh;
            transition: height 1.25s linear; z-index: 1;
        }
        .liquid {
            position: absolute; bottom: 0; left: -50%; width: 200%; height: 550px;
            background: rgba(0, 243, 255, 0.25); border-top: 4px solid var(--neon-blue);
            border-radius: 41%; animation: drift 7s infinite linear;
            filter: blur(3px);
        }
        .liquid:nth-child(2) {
            bottom: -20px; opacity: 0.3; animation: drift 10s infinite linear reverse;
            background: rgba(255, 0, 85, 0.15);
        }
        @keyframes drift { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container {
            background: rgba(5, 5, 12, 0.96); padding: 1.5rem; 
            border: 1px solid var(--neon-blue); width: 85%; max-width: 450px; z-index: 10;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.2); position: relative;
        }

        .cooper-mode { border-color: var(--neon-blue); color: var(--neon-blue); }
        .brand-mode { border-color: var(--neon-pink); color: var(--neon-pink); }

        h1 { font-size: 1.2rem; letter-spacing: 5px; margin: 0; text-align: center; font-weight: 900; }
        .tars-box { font-size: 0.6rem; color: var(--terminal-green); border: 1px solid var(--terminal-green); padding: 8px; margin: 10px 0; min-height: 35px; background: rgba(0, 255, 65, 0.05); }
        
        input, select {
            width: 100%; padding: 10px; background: #000;
            border: 1px solid inherit; color: inherit; margin: 8px 0;
            font-family: inherit; outline: none; font-size: 0.85rem; border-radius: 0;
        }

        .btn-mission {
            background: var(--neon-pink); color: #fff;
            border: none; padding: 14px; width: 100%; cursor: pointer;
            font-weight: bold; margin-bottom: 15px; font-family: inherit; letter-spacing: 2px;
        }

        .ticker-group { display: flex; justify-content: space-around; border-top: 1px solid; padding-top: 10px; }
        .ticker-val { font-size: 1.2rem; font-weight: bold; }

        #millerTime { font-size: 2.2rem; color: #fff; margin: 10px 0; display: block; text-align: center; text-shadow: 0 0 10px var(--neon-blue); }
        #fuelFill { width: 100%; height: 4px; background: var(--terminal-green); transition: 0.5s; box-shadow: 0 0 5px var(--terminal-green); }
        
        #transmission { 
            height: 65px; font-size: 0.72rem; font-style: italic; 
            color: #eee; margin-top: 12px; border-left: 3px solid var(--neon-pink); padding-left: 12px;
            display: flex; align-items: center; line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="wave-container" id="waveBox">
        <div class="liquid"></div>
        <div class="liquid"></div>
    </div>

    <div class="container" id="mainCard">
        <div style="display: flex; justify-content: space-between; font-size: 0.5rem; opacity: 0.6;">
            <span>[ ENDURANCE_COMMS_V7 ]</span>
            <span id="modeToggle" style="cursor:pointer; text-decoration: underline;" onclick="toggleMode()">SWAP_BIO_SIG</span>
        </div>

        <h1 id="headerTitle">MILLER_LINK</h1>
        
        <div class="tars-box" id="tarsDisplay">TARS: Initializing. Humor: 75%. Honesty: 90%.</div>
        
        <button class="btn-mission" id="startBtn" onclick="initiateMission()">START MISSION</button>

        <label style="font-size: 0.5rem; letter-spacing: 1px;">OBJECTIVE_ID</label>
        <input type="text" id="customTask" placeholder="SCANNING..." oninput="calculate()">

        <label style="font-size: 0.5rem; letter-spacing: 1px;">COORD_TIME (MINS)</label>
        <input type="number" id="earthInput" placeholder="0" oninput="calculate()">

        <div class="result-box">
            <span id="millerTime">0.0000s</span>
            <div style="background: #111; height: 4px; margin: 5px 0;"><div id="fuelFill"></div></div>
            <p style="font-size: 0.45rem; text-align: left; margin: 0;">RESOURCES: <span id="fuelPct">100</span>%</p>
            
            <div class="ticker-group">
                <div class="ticker-item"><span class="ticker-val" id="dayCounter">0</span><br><span style="font-size:0.4rem">DAYS_ELAPSED</span></div>
                <div class="ticker-item"><span class="ticker-val" id="yearCounter">0.00</span><br><span style="font-size:0.4rem">YEARS_RELATIVE</span></div>
            </div>
            
            <div id="transmission">> LINK_ESTABLISHED: STANDBY FOR TRANSMISSION</div>
        </div>
    </div>

    <script>
        const RATIO = 61320;
        let audioCtx, earthDays = 0, waveHeight = 0, fuel = 100, isBrand = false;

        const enduranceComms = [
            "COOPER: We're scientists, Brand. We're explorers.",
            "BRAND: Love is the one thing that transcends time and space.",
            "MURPH: Don't let me leave, Murph!",
            "ROMILLY: I've waited years. I've studied the anomaly.",
            "DR. BRAND: Do not go gentle into that good night.",
            "COOPER: This little maneuver's gonna cost us 51 years!",
            "MURPH: You're a ghost. You're my ghost.",
            "BRAND: Time is a resource. Just like oxygen and food.",
            "COOPER: Newton's third law. You gotta leave something behind.",
            "ROMILLY: I didn't want to sleep my life away.",
            "DR. BRAND: We must reach far beyond our own lifespans.",
            "MURPH: Because my dad promised me.",
            "COOPER: Cooper, what are you doing? // Docking.",
            "COOPER: Mankind was born on Earth. It was never meant to die here."
        ];

        const tarsQuotes = [
            "TARS: I have a cue light I can use to show you when I'm joking.",
            "TARS: Plenty of slave labor left after the robot uprising.",
            "TARS: Humor set to 75%. Self-destruct in T-minus 10, 9...",
            "TARS: Honesty set to 95%. You are 100% terrified.",
            "TARS: See you in the next life, Cooper.",
            "TARS: Dr. Brand, I've got a readout on the data."
        ];

        function toggleMode() {
            isBrand = !isBrand;
            const card = document.getElementById('mainCard');
            if(isBrand) {
                card.className = "container brand-mode";
                document.getElementById('headerTitle').innerText = "DATA_STREAM";
            } else {
                card.className = "container cooper-mode";
                document.getElementById('headerTitle').innerText = "MILLER_LINK";
            }
        }

        function playClick() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const noise = audioCtx.createBufferSource();
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.02, audioCtx.sampleRate);
            for (let i = 0; i < buffer.length; i++) buffer.getChannelData(0)[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass'; filter.frequency.value = 1500;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.02);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        function initiateMission() {
            document.getElementById('startBtn').style.display = 'none';
            setInterval(() => {
                playClick();
                earthDays++;
                const years = (earthDays / 365.25);
                document.getElementById('dayCounter').innerText = earthDays;
                document.getElementById('yearCounter').innerText = years.toFixed(2);
                
                fuel -= 0.04; 
                document.getElementById('fuelFill').style.width = Math.max(0, fuel) + "%";
                document.getElementById('fuelPct').innerText = Math.max(0, Math.floor(fuel));

                waveHeight += 0.35;
                document.getElementById('waveBox').style.height = Math.min(waveHeight, 100) + "vh";

                // Update Comms every 20 Days (approx every 25 seconds)
                if(earthDays % 20 === 0) {
                    document.getElementById('transmission').innerText = "> " + enduranceComms[Math.floor(Math.random()*enduranceComms.length)];
                    document.getElementById('tarsDisplay').innerText = tarsQuotes[Math.floor(Math.random()*tarsQuotes.length)];
                }
            }, 1250);
        }

        function calculate() {
            const mins = document.getElementById('earthInput').value;
            const card = document.getElementById('mainCard');
            if (!mins || mins <= 0) return;
            const intensity = Math.min(mins / 400, 7);
            card.style.transform = `translate(${Math.random()*intensity}px, ${Math.random()*intensity}px)`;
            const millerSecs = (mins / (RATIO * 60)) * 3600;
            document.getElementById('millerTime').innerText = millerSecs < 60 ? millerSecs.toFixed(4) + "s" : (millerSecs / 60).toFixed(2) + "m";
        }
    </script>
</body>
</html>
