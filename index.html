<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GARGANTUA_OS // V.16</title>
    <style>
        :root { --blue: #00f3ff; --pink: #ff0055; --green: #00ff41; --bg: #020205; }
        
        body {
            background: var(--bg); color: var(--blue);
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; margin: 0;
            overflow: hidden; touch-action: none; /* Prevents scrolling/zooming */
        }

        /* THE CONTROL OVERLAY - This catches every tap */
        #inputLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; display: none; background: transparent;
        }

        .container {
            background: rgba(5, 5, 12, 0.98); padding: 1rem; 
            border: 2px solid var(--blue); width: 90%; max-width: 400px;
            z-index: 10; position: relative;
        }

        #warning {
            background: var(--pink); color: #fff; font-weight: bold;
            font-size: 0.7rem; text-align: center; padding: 8px;
            display: none; margin-bottom: 10px;
        }

        .btn-mission {
            background: var(--pink); color: #fff; border: none; padding: 15px; 
            width: 100%; cursor: pointer; font-weight: bold; font-family: inherit;
        }

        #gameArea {
            margin-top: 15px; border: 1px dashed #444; height: 120px; 
            position: relative; background: #000; overflow: hidden;
        }
        
        #ship {
            position: absolute; left: 20px; top: 50%; width: 25px; height: 18px;
            background: #fff; clip-path: polygon(0 40%, 100% 0, 70% 50%, 100% 100%, 0 60%);
            transition: top 0.08s ease-out; /* Makes the pulse look snappy */
        }

        .safe-zone {
            position: absolute; right: 0; top: 25%; height: 40%; width: 40px;
            background: rgba(0, 255, 65, 0.2); border-left: 2px solid var(--green);
        }

        #transmission { 
            height: 60px; font-size: 0.65rem; color: #aaa; border-left: 2px solid var(--pink);
            margin-top: 10px; padding-left: 10px; display: flex; align-items: center;
        }
    </style>
</head>
<body id="masterBody">

    <div id="inputLayer"></div>

    <div class="container">
        <div id="warning">CRITICAL: GRAVITY WELL PENETRATION</div>
        <h1 style="font-size: 1rem; text-align: center; margin: 0 0 10px 0;">GARGANTUA_OS_V16</h1>
        
        <div id="tars" style="font-size:0.6rem; color:var(--green); margin-bottom:10px;">TARS: "Honesty 90%. Humor 75%."</div>
        
        <button class="btn-mission" id="startBtn" onclick="initiateMission()">INITIATE LANDING</button>

        <div id="ui" style="display:none">
            <input type="number" id="earthInput" style="width:100%; padding:10px; background:#000; border:1px solid var(--blue); color:var(--blue); font-family:inherit;" placeholder="EARTH MINUTES" oninput="calculate()">

            <div style="text-align:center; margin-top:10px;">
                <span id="millerTime" style="font-size: 2rem; color: #fff;">0.0000s</span>
            </div>
            
            <div style="display:flex; justify-content:space-around; text-align:center; margin-top:10px;">
                <div><span id="days" style="font-size:1.1rem; font-weight:bold;">0</span><br><span style="font-size:0.4rem">DAYS_LOST</span></div>
                <div><span id="years" style="font-size:1.1rem; font-weight:bold;">0.00</span><br><span style="font-size:0.4rem">YEARS_LOST</span></div>
            </div>

            <div id="gameArea">
                <div class="safe-zone"></div>
                <div id="ship"></div>
            </div>

            <div id="transmission">> COMMS_OFFLINE</div>
        </div>
    </div>

    <script>
        const RATIO = 61320;
        let audioCtx, days = 0, missionActive = false, shipPos = 50;

        const quotes = [
            "COOPER: This little maneuver's gonna cost us 51 years!",
            "BRAND: Love transcends time and space.",
            "MURPH: Don't let me leave, Murph!",
            "ROMILLY: I've waited years. I've studied the anomaly.",
            "PROF. BRAND: I'm not afraid of death. I'm afraid of time.",
            "DOYLE: Start the engines, Cooper!"
        ];

        function playClick(p) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'square'; o.frequency.value = p;
            g.gain.setValueAtTime(0.04, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.03);
        }

        // HARDWIRED INPUT
        const inputLayer = document.getElementById('inputLayer');
        
        function thrust(e) {
            if (!missionActive) return;
            e.preventDefault();
            shipPos = Math.max(0, shipPos - 12); // Direct position jump up
            document.getElementById('ship').style.top = shipPos + "%";
            playClick(1800);
        }

        inputLayer.addEventListener('touchstart', thrust, {passive: false});
        inputLayer.addEventListener('mousedown', thrust);

        function initiateMission() {
            missionActive = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('inputLayer').style.display = 'block';
            
            setInterval(() => {
                // Natural Gravity
                shipPos = Math.min(92, shipPos + 4); 
                document.getElementById('ship').style.top = shipPos + "%";

                const isSafe = (shipPos >= 25 && shipPos <= 65);
                let dilation = isSafe ? 1 : 12; // 12-day penalty for failing
                
                document.getElementById('warning').style.display = isSafe ? 'none' : 'block';

                playClick(1200);
                days += dilation;
                document.getElementById('days').innerText = days;
                document.getElementById('years').innerText = (days / 365.25).toFixed(2);
                
                if (days % 10 === 0) {
                    document.getElementById('transmission').innerText = "> " + quotes[Math.floor(Math.random()*quotes.length)];
                }
            }, 1250);
        }

        function calculate() {
            const mins = document.getElementById('earthInput').value;
            const millerSecs = (mins / (RATIO * 60)) * 3600;
            document.getElementById('millerTime').innerText = millerSecs < 60 ? millerSecs.toFixed(4) + "s" : (millerSecs / 60).toFixed(2) + "m";
        }
    </script>
</body>
</html>
