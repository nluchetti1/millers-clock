<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARGANTUA_OS // V.08</title>
    <style>
        :root { 
            --neon-blue: #00f3ff; --neon-pink: #ff0055; --terminal-green: #00ff41; --bg: #020205; 
        }
        
        body {
            background-color: var(--bg); color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; margin: 0;
            overflow: hidden; position: relative;
        }

        body::before {
            content: " "; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; z-index: 100; pointer-events: none;
        }

        .wave-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 0vh;
            transition: height 1.25s linear; z-index: 1;
        }
        .liquid {
            position: absolute; bottom: 0; left: -50%; width: 200%; height: 600px;
            background: rgba(0, 243, 255, 0.25); border-top: 4px solid var(--neon-blue);
            border-radius: 41%; animation: drift 7s infinite linear;
            filter: blur(3px);
        }

        @keyframes drift { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container {
            background: rgba(5, 5, 12, 0.96); padding: 1.5rem; 
            border: 1px solid var(--neon-blue); width: 85%; max-width: 450px; z-index: 10;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.2); position: relative;
            transition: all 0.5s ease;
        }

        .dead-mode { border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 0 0 40px var(--neon-pink); filter: grayscale(50%); }

        h1 { font-size: 1.2rem; letter-spacing: 5px; margin: 0; text-align: center; }
        .tars-box { font-size: 0.6rem; color: var(--terminal-green); border: 1px solid var(--terminal-green); padding: 8px; margin: 10px 0; min-height: 35px; }
        
        input, select {
            width: 100%; padding: 10px; background: #000; border: 1px solid inherit; 
            color: inherit; margin: 8px 0; font-family: inherit; font-size: 0.85rem;
        }

        .btn-mission {
            background: var(--neon-pink); color: #fff; border: none; padding: 14px; 
            width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 15px; font-family: inherit;
        }

        #millerTime { font-size: 2.2rem; color: #fff; margin: 10px 0; display: block; text-align: center; }
        #fuelFill { width: 100%; height: 4px; background: var(--terminal-green); transition: 0.5s; }
        
        #transmission { 
            height: 70px; font-size: 0.72rem; font-style: italic; color: #eee; 
            margin-top: 12px; border-left: 3px solid var(--neon-pink); padding-left: 12px;
            display: flex; align-items: center; line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="wave-container" id="waveBox"><div class="liquid"></div></div>

    <div class="container" id="mainCard">
        <h1 id="headerTitle">MILLER_ARCHIVE</h1>
        <div class="tars-box" id="tarsDisplay">TARS: Archive initialized. Don't make me leave you behind.</div>
        <button class="btn-mission" id="startBtn" onclick="initiateMission()">START MISSION</button>

        <label style="font-size: 0.5rem;">OBJECTIVE</label>
        <input type="text" id="customTask" placeholder="SCANNING..." oninput="calculate()">
        <label style="font-size: 0.5rem;">EARTH_MINS</label>
        <input type="number" id="earthInput" placeholder="0" oninput="calculate()">

        <div class="result-box">
            <span id="millerTime">0.0000s</span>
            <div style="background: #111; height: 4px; margin: 5px 0;"><div id="fuelFill"></div></div>
            <div class="ticker-group" style="display:flex; justify-content:space-around; text-align:center;">
                <div><span id="dayCounter" style="font-size:1.2rem; font-weight:bold;">0</span><br><span style="font-size:0.4rem">DAYS_LOST</span></div>
                <div><span id="yearCounter" style="font-size:1.2rem; font-weight:bold;">0.00</span><br><span style="font-size:0.4rem">YEARS_LOST</span></div>
            </div>
            <div id="transmission">> LINK_STANDBY...</div>
        </div>
    </div>

    <script>
        const RATIO = 61320;
        let audioCtx, earthDays = 0, fuel = 100;

        const enduranceComms = [
            "COOPER: We're scientists, Brand. We're explorers.",
            "BRAND: Love is the one thing that transcends time and space.",
            "MURPH: Don't let me leave, Murph!",
            "ROMILLY: I've waited years. I've studied the anomaly.",
            "PROF. BRAND: I'm not afraid of death. I'm afraid of time.",
            "DOYLE: We need to get back. Now!",
            "COOPER: This little maneuver's gonna cost us 51 years!",
            "PROF. BRAND: Do not go gentle into that good night.",
            "DOYLE: Start the engines, Cooper!",
            "MURPH: Because my dad promised me.",
            "BRAND: Time is a resource. Just like oxygen.",
            "ROMILLY: I didn't want to sleep my life away."
        ];

        const tarsQuotes = [
            "TARS: Humor set to 75%. Self-destruct in 10, 9...",
            "TARS: Plenty of slave labor left for the robots.",
            "TARS: Honesty 90%. You're looking a bit tired, Cooper.",
            "TARS: Setting humor to 60%. Better?",
            "TARS: Fuel levels reaching critical state."
        ];

        function playClick() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square'; osc.frequency.value = 1500;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.02);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.02);
        }

        function initiateMission() {
            document.getElementById('startBtn').style.display = 'none';
            setInterval(() => {
                if (fuel > 0) {
                    playClick();
                    earthDays++;
                    const years = (earthDays / 365.25);
                    document.getElementById('dayCounter').innerText = earthDays;
                    document.getElementById('yearCounter').innerText = years.toFixed(2);
                    
                    fuel -= 0.06;
                    document.getElementById('fuelFill').style.width = Math.max(0, fuel) + "%";
                    
                    if (earthDays % 15 === 0) {
                        document.getElementById('transmission').innerText = "> " + enduranceComms[Math.floor(Math.random()*enduranceComms.length)];
                        document.getElementById('tarsDisplay').innerText = tarsQuotes[Math.floor(Math.random()*tarsQuotes.length)];
                    }

                    let waveH = (earthDays / 500) * 100;
                    document.getElementById('waveBox').style.height = Math.min(waveH, 100) + "vh";
                } else {
                    document.getElementById('mainCard').classList.add('dead-mode');
                    document.getElementById('tarsDisplay').innerText = "TARS: Fuel exhausted. Signal lost. Goodbye, Cooper.";
                    document.getElementById('transmission').innerText = "> CRITICAL FAILURE: SYSTEM SHUTDOWN";
                }
            }, 1250);
        }

        function calculate() {
            const mins = document.getElementById('earthInput').value;
            const millerSecs = (mins / (RATIO * 60)) * 3600;
            document.getElementById('millerTime').innerText = millerSecs < 60 ? millerSecs.toFixed(4) + "s" : (millerSecs / 60).toFixed(2) + "m";
        }
    </script>
</body>
</html>
