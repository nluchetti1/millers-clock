<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GARGANTUA_OS // V.34</title>
    <style>
        :root { 
            --neon-blue: #00f3ff; --neon-pink: #ff0055; --terminal-green: #00ff41; 
            --tesseract-gold: #f4d03f; --bg: #020000;
        }
        
        body {
            background-color: var(--bg); color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; margin: 0;
            overflow: hidden; perspective: 1200px;
        }

        .container {
            background: rgba(0, 0, 0, 0.98); padding: 1.2rem; 
            border: 1px solid var(--neon-blue); width: 88%; max-width: 450px; z-index: 10;
        }

        .tesseract-warp { animation: tesseract-unfold 5s forwards; pointer-events: none; }
        @keyframes tesseract-unfold {
            0% { transform: translateZ(0); }
            100% { transform: translateZ(1000px) rotateY(-90deg); opacity: 0; }
        }

        #gameArea {
            margin-top: 10px; border: 1px double #444; height: 160px; position: relative;
            background: #000; overflow: hidden; touch-action: none;
        }
        
        /* The Red Pressure Line (Event Horizon) */
        .event-horizon-line {
            position: absolute; left: 60%; top: 0; width: 2px; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, var(--neon-pink) 5px, transparent 10px);
            box-shadow: 0 0 10px var(--neon-pink); z-index: 1;
        }

        #ship {
            position: absolute; left: 30%; top: 45%; width: 24px; height: 18px;
            background: #fff; clip-path: polygon(100% 40%, 0 0, 30% 50%, 0 100%, 100% 60%);
            transition: left 0.1s linear, top 0.1s linear; z-index: 5;
            box-shadow: 0 0 10px #fff;
        }

        .saboteur {
            position: absolute; width: 32px; height: 32px;
            background: radial-gradient(circle, #555 20%, #222 80%);
            border-radius: 50%; border: 2px solid #fff;
            box-shadow: 0 0 15px var(--neon-pink);
            display: flex; align-items: center; justify-content: center; z-index: 4;
        }
        .saboteur::before { content: "MANN"; font-size: 7px; color: var(--neon-pink); font-weight: bold; }

        input {
            width: 100%; padding: 8px; background: #000; border: 1px solid var(--neon-blue); 
            color: var(--neon-blue); margin-bottom: 5px; font-family: inherit; font-size: 0.8rem;
        }

        #winScreen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #fff 0%, var(--tesseract-gold) 100%);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
            color: #000; text-align: center; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="winScreen">
        <h1 style="font-size: 3rem; margin: 0;">S T A Y</h1>
        <p>GRAVITY IS A SIGNAL. <br> DATA RECEIVED. SAVING MURPH.</p>
        <button onclick="location.reload()" style="padding:15px 30px; background:#000; color:#fff; border:none; margin-top:20px; cursor:pointer;">RE-SYNC</button>
    </div>

    <div class="container" id="mainCard">
        <div id="warningHeader" style="background:var(--neon-pink); color:#fff; font-size:0.65rem; text-align:center; display:none; padding:5px; margin-bottom:8px; font-weight:bold;">
            SINGULARITY PRESSURE: HULL COMPROMISED
        </div>
        <h1 style="font-size: 0.85rem; text-align: center; letter-spacing: 4px;">GARGANTUA_OS_V34</h1>
        
        <div id="tarsDisplay" style="font-size:0.55rem; color:var(--terminal-green); margin:8px 0; min-height: 24px;">TARS: "Data Sync Target: 20 Years. Avoid crossing the red line."</div>
        
        <button class="btn-mission" id="startBtn" onclick="initiateMission()" style="background:var(--neon-pink); color:#fff; border:none; padding:12px; width:100%; font-weight:bold; cursor:pointer;">ENGAGE MISSION</button>

        <div id="ui-elements" style="display:none">
            <input type="text" id="objName" placeholder="MISSION_OBJECTIVE">
            <input type="number" id="earthInput" placeholder="EARTH_MINS" oninput="calculate()">

            <div style="width: 100%; height: 5px; background: #222; margin-top:10px;"><div id="hullFill" style="width: 100%; height: 100%; background: var(--terminal-green); transition: 0.2s;"></div></div>
            <p style="font-size:0.4rem; margin:2px 0;">HULL_STABILITY: <span id="hullPct">100</span>%</p>

            <div class="result-box">
                <span id="millerTime" style="font-size: 1.8rem; color: #fff; display: block; text-align: center;">0.0000s</span>
                
                <div style="display:flex; justify-content:space-around; text-align:center; margin: 10px 0;">
                    <div><span id="dayCounter" style="font-weight:bold;">0</span><br><span style="font-size:0.4rem">DAYS</span></div>
                    <div><span id="yearCounter" style="font-size:1.1rem; font-weight:bold;">0.00</span><br><span style="font-size:0.4rem">YEARS</span></div>
                </div>

                <div id="gameArea" onclick="handleInput(event)" ontouchstart="handleInput(event)">
                    <div style="position:absolute; left:0; top:0; height:100%; width:20%; background:rgba(0,255,65,0.1); border-right:1px solid var(--terminal-green);"></div>
                    <div class="event-horizon-line"></div>
                    <div id="ship"></div>
                </div>

                <div id="transmission" style="font-size:0.6rem; color:#ccc; margin-top:10px; border-left:2px solid var(--neon-pink); padding-left:10px;">> STANDBY...</div>
            </div>
        </div>
    </div>

    <script>
        const RATIO = 61320;
        let audioCtx, days = 0, hull = 100, missionActive = false;
        let shipX = 30, shipY = 45; 
        const saboteurs = [];

        function playSound(p, d=0.04) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'square'; o.frequency.value = p;
            g.gain.setValueAtTime(0.04, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function handleInput(e) {
            if (!missionActive) return;
            e.preventDefault();
            const rect = gameArea.getBoundingClientRect();
            const tx = ((e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left) / rect.width * 100;
            const ty = ((e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top) / rect.height * 100;
            if (tx < shipX) shipX -= 15; else shipX += 5;
            if (ty < shipY) shipY -= 20; else shipY += 20;
            updateShip();
            playSound(1800);
        }

        function updateShip() {
            shipX = Math.max(0, Math.min(94, shipX));
            shipY = Math.max(0, Math.min(85, shipY));
            document.getElementById('ship').style.left = shipX + "%";
            document.getElementById('ship').style.top = shipY + "%";
        }

        function initiateMission() {
            missionActive = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('ui-elements').style.display = 'block';
            
            const timer = setInterval(() => {
                shipX = Math.min(94, shipX + (3 + shipX/12));
                updateShip();

                let dilation = (shipX > 20) ? Math.floor(Math.pow(1.09, shipX - 20) + 1) : 1;
                
                // PRESSURE LOGIC (Triggered by crossing the 60% Red Line)
                if (shipX > 60) {
                    hull -= 6; 
                    document.getElementById('warningHeader').innerText = "CRITICAL: EVENT HORIZON BREACHED";
                    document.getElementById('warningHeader').style.display = 'block';
                } else if (dilation > 1) {
                    document.getElementById('warningHeader').innerText = "RELATIVISTIC THREAT // MANN DETECTED";
                    document.getElementById('warningHeader').style.display = 'block';
                } else {
                    document.getElementById('warningHeader').style.display = 'none';
                }

                days += dilation;
                let yrs = days / 365.25;
                document.getElementById('dayCounter').innerText = days;
                document.getElementById('yearCounter').innerText = yrs.toFixed(2);
                
                if (hull <= 0) {
                    hull = 0;
                    document.getElementById('hullFill').style.width = "0%";
                    document.getElementById('hullPct').innerText = "0";
                    document.getElementById('tarsDisplay').innerText = "TARS: Singularity reached. Mission failed.";
                    clearInterval(timer);
                    missionActive = false;
                    return;
                }
                
                document.getElementById('hullFill').style.width = hull + "%";
                document.getElementById('hullPct').innerText = Math.max(0, hull);

                if (yrs >= 20) {
                    clearInterval(timer);
                    win();
                }

                if (Math.random() > 0.4) spawnMann();
                if (shipX > 60) spawnMann(); // Aggressive spawn once past the line

                for (let i = saboteurs.length - 1; i >= 0; i--) {
                    let s = saboteurs[i]; 
                    s.x -= (18 + dilation * 0.8);
                    s.el.style.left = s.x + "%";
                    if (Math.abs(s.x - shipX) < 8 && Math.abs(s.y - shipY) < 16) {
                        hull -= 20;
                        shipX = Math.min(94, shipX + 35);
                        playSound(300, 0.2); s.el.remove(); saboteurs.splice(i, 1);
                    } else if (s.x < -15) { s.el.remove(); saboteurs.splice(i, 1); }
                }

                playSound(1200 + (yrs * 40), 0.05);
            }, 1250);
        }

        function spawnMann() {
            const sab = document.createElement('div');
            sab.className = 'saboteur';
            sab.style.left = '110%'; sab.style.top = Math.random() * 80 + '%';
            document.getElementById('gameArea').appendChild(sab);
            saboteurs.push({el: sab, x: 110, y: parseFloat(sab.style.top)});
        }

        function win() {
            missionActive = false;
            document.getElementById('mainCard').classList.add('tesseract-warp');
            setTimeout(() => { document.getElementById('winScreen').style.display = 'flex'; }, 4000);
        }

        function calculate() {
            const mins = document.getElementById('earthInput').value;
            const millerSecs = (mins / (RATIO * 60)) * 3600;
            document.getElementById('millerTime').innerText = millerSecs < 60 ? millerSecs.toFixed(4) + "s" : (millerSecs / 60).toFixed(2) + "m";
        }
    </script>
</body>
</html>
