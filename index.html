<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GARGANTUA_OS // V.15</title>
    <style>
        :root { 
            --neon-blue: #00f3ff; --neon-pink: #ff0055; --terminal-green: #00ff41; --bg: #020205; 
        }
        
        body {
            background-color: var(--bg); color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; margin: 0;
            overflow: hidden; position: relative;
        }

        /* INVISIBLE INPUT LAYER - Sits on top of EVERYTHING */
        #touchOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; display: none; /* Only active when mission starts */
            touch-action: none;
        }

        .wave-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 0vh;
            z-index: 0; pointer-events: none;
        }
        .liquid {
            position: absolute; bottom: 0; left: -50%; width: 200%; height: 600px;
            background: rgba(0, 243, 255, 0.1); border-top: 2px solid var(--neon-blue);
            border-radius: 41%; animation: drift 7s infinite linear;
        }
        @keyframes drift { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container {
            background: rgba(5, 5, 12, 0.98); padding: 1.2rem; 
            border: 2px solid var(--neon-blue); width: 88%; max-width: 450px; z-index: 10;
            position: relative; box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        #warningHeader {
            background: var(--neon-pink); color: #fff; font-weight: bold;
            font-size: 0.7rem; text-align: center; padding: 5px; margin-bottom: 10px;
            display: none; animation: flash 0.4s infinite;
        }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .btn-mission {
            background: var(--neon-pink); color: #fff; border: none; padding: 15px; 
            width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; 
            font-family: inherit; z-index: 10000; position: relative;
        }

        #gameArea {
            margin-top: 10px; border: 1px dashed #444; height: 120px; position: relative;
            background: #000; overflow: hidden;
        }
        #endurance {
            position: absolute; left: 20px; top: 40%; width: 24px; height: 18px;
            background: #fff; clip-path: polygon(0 40%, 100% 0, 70% 50%, 100% 100%, 0 60%);
        }
        .safe-zone {
            position: absolute; right: 0; top: 25%; height: 40%; width: 40px;
            background: rgba(0, 255, 65, 0.2); border-left: 2px solid var(--terminal-green);
        }

        #dockingUI {
            display: none; border: 2px solid var(--neon-pink); padding: 10px; margin-top: 10px;
            text-align: center;
        }
        .dock-ring {
            width: 70px; height: 70px; border: 3px dashed var(--neon-pink);
            border-radius: 50%; margin: 10px auto; position: relative;
        }
        #pointer {
            position: absolute; top: 50%; left: 50%; width: 35px; height: 3px;
            background: #fff; transform-origin: left center;
        }

        input {
            z-index: 10001; position: relative; /* Keep inputs above the touch overlay */
        }
    </style>
</head>
<body>

    <div id="touchOverlay"></div>

    <div class="wave-container" id="waveBox"><div class="liquid"></div></div>

    <div class="container" id="mainCard">
        <div id="warningHeader">CRITICAL: GRAVITY WELL PENETRATION</div>
        
        <h1 style="font-size: 0.9rem; text-align: center;">GARGANTUA_OS // V.15</h1>
        <div id="tarsDisplay" style="font-size:0.55rem; color:var(--terminal-green); margin:8px 0; min-height: 24px;">TARS: "Establishing control link. Tap anywhere."</div>
        
        <button class="btn-mission" id="startBtn" onclick="initiateMission()">INITIATE LANDING</button>

        <div id="ui-elements" style="display:none">
            <input type="text" id="customTask" style="width:100%; padding:8px; background:#000; border:1px solid var(--neon-blue); color:var(--neon-blue); margin-bottom:5px;" placeholder="OBJECTIVE NAME">
            <input type="number" id="earthInput" style="width:100%; padding:8px; background:#000; border:1px solid var(--neon-blue); color:var(--neon-blue);" placeholder="EARTH MINUTES" oninput="calculate()">

            <div class="result-box">
                <div style="text-align: center; margin-top: 10px;">
                    <span id="millerTime" style="font-size: 1.8rem; color: #fff; display: block;">0.0000s</span>
                </div>
                
                <div style="background: #111; height: 6px; margin: 10px 0;"><div id="fuelFill" style="width: 100%; height: 100%; background: var(--terminal-green);"></div></div>
                
                <div style="display:flex; justify-content:space-around; text-align:center;">
                    <div><span id="dayCounter" style="font-size:1.1rem; font-weight:bold;">0</span><br><span style="font-size:0.4rem">DAYS_LOST</span></div>
                    <div><span id="yearCounter" style="font-size:1.1rem; font-weight:bold;">0.00</span><br><span style="font-size:0.4rem">YEARS_LOST</span></div>
                </div>

                <div id="gameArea">
                    <div class="safe-zone"></div>
                    <div id="endurance"></div>
                </div>

                <div id="dockingUI">
                    <div style="font-size: 0.6rem; color: #fff;">DOCKING_SEQUENCE: TAP TO ALIGN</div>
                    <div class="dock-ring">
                        <div id="pointer"></div>
                        <div style="position:absolute; top:50%; right:-5px; width:15px; height:15px; background:var(--terminal-green); transform:translateY(-50%);"></div>
                    </div>
                </div>

                <div id="transmission" style="font-size:0.65rem; color:#ccc; margin-top:10px; border-left:2px solid var(--neon-pink); padding-left:10px;">> COMMS_OFFLINE</div>
            </div>
        </div>
    </div>

    <script>
        const RATIO = 61320;
        let audioCtx, earthDays = 0, fuel = 100, missionActive = false, dockingMode = false;
        let endurancePos = 40, gravity = 0.45, velocity = 0, rotation = 0;

        const crewQuotes = [
            "COOPER: This little maneuver's gonna cost us 51 years!",
            "PROF. BRAND: I'm not afraid of death. I'm afraid of time.",
            "ROMILLY: I've waited years. I've studied the anomaly.",
            "BRAND: Love transcends time and space.",
            "MURPH: You're a ghost. You're my ghost.",
            "DOYLE: Start the engines, Cooper!",
            "CASE: We are picking up an anomaly.",
            "PROF. BRAND: Do not go gentle into that good night.",
            "COOPER: Cooper, what are you doing? // Docking."
        ];

        function playSound(p) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'square'; o.frequency.value = p;
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.03);
        }

        // CONTROL OVERLAY LOGIC
        const overlay = document.getElementById('touchOverlay');
        
        function handleAction(e) {
            if (!missionActive) return;
            e.preventDefault();
            if (dockingMode) {
                const check = rotation % 360;
                if (check > 340 || check < 20) {
                    fuel = 60; dockingMode = false;
                    document.getElementById('dockingUI').style.display = 'none';
                    document.getElementById('gameArea').style.display = 'block';
                    document.getElementById('tarsDisplay').innerText = "TARS: Docking successful.";
                } else { playSound(300); }
            } else {
                velocity = -3.8; // STRONG PULSE
                playSound(1800);
            }
        }

        overlay.addEventListener('touchstart', handleAction);
        overlay.addEventListener('mousedown', handleAction);

        function initiateMission() {
            missionActive = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('ui-elements').style.display = 'block';
            document.getElementById('touchOverlay').style.display = 'block';
            
            setInterval(() => {
                if (fuel <= 0) return;

                if (dockingMode) {
                    rotation += 25;
                    document.getElementById('pointer').style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
                } else {
                    velocity += gravity;
                    endurancePos += velocity;
                    if (endurancePos > 92) endurancePos = 92;
                    if (endurancePos < -5) { endurancePos = -5; velocity = 0; }
                    document.getElementById('endurance').style.top = endurancePos + "%";
                }

                const outOfSafe = (endurancePos < 25 || endurancePos > 65);
                let dilation = outOfSafe ? 12 : 1; // Even higher penalty for V15
                
                const warn = document.getElementById('warningHeader');
                warn.style.display = (outOfSafe && !dockingMode) ? 'block' : 'none';

                playSound(1200);
                earthDays += dilation;
                document.getElementById('dayCounter').innerText = earthDays;
                document.getElementById('yearCounter').innerText = (earthDays / 365.25).toFixed(2);
                
                fuel -= 0.5; // AGGRESSIVE FUEL DRAIN
                document.getElementById('fuelFill').style.width = Math.max(0, fuel) + "%";
                
                if (fuel < 20 && !dockingMode) {
                    dockingMode = true;
                    document.getElementById('gameArea').style.display = 'none';
                    document.getElementById('dockingUI').style.display = 'block';
                    document.getElementById('tarsDisplay').innerText = "TARS: MATCH ROTATION!";
                }

                if (earthDays % 10 === 0) {
                    document.getElementById('transmission').innerText = "> " + crewQuotes[Math.floor(Math.random()*crewQuotes.length)];
                }

                document.getElementById('waveBox').style.height = Math.min((earthDays/200)*100, 100) + "vh";

                if (fuel <= 0) {
                    document.getElementById('tarsDisplay').innerText = "TARS: Mission failed. System dark.";
                    document.getElementById('mainCard').style.filter = "grayscale(1) brightness(0.2)";
                    document.getElementById('touchOverlay').style.display = 'none';
                }
            }, 1250);
        }

        function calculate() {
            const mins = document.getElementById('earthInput').value;
            const millerSecs = (mins / (RATIO * 60)) * 3600;
            document.getElementById('millerTime').innerText = millerSecs < 60 ? millerSecs.toFixed(4) + "s" : (millerSecs / 60).toFixed(2) + "m";
        }
    </script>
</body>
</html>
