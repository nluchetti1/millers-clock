<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GARGANTUA_OS // V.18</title>
    <style>
        :root { 
            --neon-blue: #00f3ff; --neon-pink: #ff0055; --terminal-green: #00ff41; --bg: #020205; 
        }
        
        body {
            background-color: var(--bg); color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; margin: 0;
            overflow: hidden; position: relative;
        }

        /* Scanlines */
        body::before {
            content: " "; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; z-index: 100; pointer-events: none;
        }

        .wave-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 0vh;
            z-index: 0; pointer-events: none; transition: height 1.25s linear;
        }
        .liquid {
            position: absolute; bottom: 0; left: -50%; width: 200%; height: 600px;
            background: rgba(0, 243, 255, 0.15); border-top: 3px solid var(--neon-blue);
            border-radius: 41%; animation: drift 7s infinite linear;
        }
        @keyframes drift { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container {
            background: rgba(5, 5, 12, 0.98); padding: 1.2rem; 
            border: 2px solid var(--neon-blue); width: 88%; max-width: 450px; z-index: 10;
            position: relative; box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        #warningHeader {
            background: var(--neon-pink); color: #fff; font-weight: bold;
            font-size: 0.7rem; text-align: center; padding: 5px; margin-bottom: 10px;
            display: none; animation: flash 0.4s infinite;
        }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .btn-mission {
            background: var(--neon-pink); color: #fff; border: none; padding: 15px; 
            width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; font-family: inherit;
        }

        #gameArea {
            margin-top: 10px; border: 1px dashed #444; height: 100px; position: relative;
            background: #000; overflow: hidden; touch-action: none;
        }
        
        /* Ship now points Left (toward safe zone) */
        #ship {
            position: absolute; left: 40%; top: 40%; width: 24px; height: 18px;
            background: #fff; clip-path: polygon(100% 40%, 0 0, 30% 50%, 0 100%, 100% 60%);
            transition: left 0.1s ease-out;
            z-index: 5;
        }

        /* Safe Zone is now on the Left side */
        .safe-zone {
            position: absolute; left: 0; top: 0; height: 100%; width: 30%;
            background: rgba(0, 255, 65, 0.15); border-right: 2px solid var(--terminal-green);
        }

        /* Gravity Well on the Right */
        .gravity-well {
            position: absolute; right: 0; top: 0; height: 100%; width: 10%;
            background: linear-gradient(90deg, transparent, var(--neon-pink));
            opacity: 0.3;
        }

        input {
            width: 100%; padding: 10px; background: #000; border: 1px solid var(--neon-blue); 
            color: var(--neon-blue); margin-bottom: 5px; font-family: inherit; font-size: 0.85rem;
            box-sizing: border-box;
        }

        #transmission { 
            height: 70px; font-size: 0.65rem; color: #ccc; 
            margin-top: 10px; border-left: 2px solid var(--neon-pink); padding-left: 10px;
            display: flex; align-items: center; overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="wave-container" id="waveBox"><div class="liquid"></div></div>

    <div class="container" id="mainCard">
        <div id="warningHeader">CRITICAL: GRAVITATIONAL PULL DETECTED</div>
        
        <h1 style="font-size: 1rem; text-align: center; letter-spacing: 5px;">MILLER_LINK</h1>
        <div id="tarsDisplay" style="font-size:0.55rem; color:var(--terminal-green); margin:8px 0; min-height: 24px;">TARS: "Gravity is pulling us right. Thrust left to stay in the green."</div>
        
        <button class="btn-mission" id="startBtn" onclick="initiateMission()">INITIATE LANDING</button>

        <div id="ui-elements" style="display:none">
            <label style="font-size: 0.5rem;">[ OBJECTIVE ]</label>
            <input type="text" id="customTask" placeholder="SCANNING..." oninput="calculate()">
            
            <label style="font-size: 0.5rem;">[ EARTH MINUTES ]</label>
            <input type="number" id="earthInput" placeholder="0" oninput="calculate()">

            <div class="result-box">
                <div style="text-align: center; margin-top: 10px;">
                    <span id="millerTime" style="font-size: 1.8rem; color: #fff; display: block;">0.0000s</span>
                </div>
                
                <div style="background: #111; height: 6px; margin: 10px 0;"><div id="fuelFill" style="width: 100%; height: 100%; background: var(--terminal-green);"></div></div>
                
                <div style="display:flex; justify-content:space-around; text-align:center;">
                    <div><span id="dayCounter" style="font-size:1.1rem; font-weight:bold;">0</span><br><span style="font-size:0.4rem">DAYS_LOST</span></div>
                    <div><span id="yearCounter" style="font-size:1.1rem; font-weight:bold;">0.00</span><br><span style="font-size:0.4rem">YEARS_LOST</span></div>
                </div>

                <div id="gameArea">
                    <div class="safe-zone"></div>
                    <div class="gravity-well"></div>
                    <div id="ship"></div>
                    <div style="position:absolute; bottom:5px; width:100%; text-align:center; font-size:0.4rem; color:var(--neon-blue); opacity:0.6;">TAP TO THRUST LEFT</div>
                </div>

                <div id="transmission">> COMMS_OFFLINE</div>
            </div>
        </div>
    </div>

    <script>
        const RATIO = 61320;
        let audioCtx, earthDays = 0, fuel = 100, missionActive = false;
        let shipX = 40, pullStrength = 3.5; // Starts in middle, drifts right

        const crewQuotes = [
            "COOPER: This little maneuver's gonna cost us 51 years!",
            "PROF. BRAND: I'm not afraid of death. I'm afraid of time.",
            "ROMILLY: I've waited years. I've studied the anomaly.",
            "BRAND: Love transcends time and space.",
            "MURPH: You're a ghost. You're my ghost.",
            "DOYLE: Start the engines, Cooper!",
            "PROF. BRAND: Do not go gentle into that good night."
        ];

        function playSound(p) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'square'; o.frequency.value = p;
            g.gain.setValueAtTime(0.04, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.03);
        }

        const gameArea = document.getElementById('gameArea');
        
        function thrustLeft(e) {
            if (!missionActive) return;
            e.preventDefault();
            shipX = Math.max(0, shipX - 12); // Pulse move Left
            document.getElementById('ship').style.left = shipX + "%";
            playSound(1800);
        }

        gameArea.addEventListener('touchstart', thrustLeft, {passive: false});
        gameArea.addEventListener('mousedown', thrustLeft);

        function initiateMission() {
            missionActive = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('ui-elements').style.display = 'block';
            
            setInterval(() => {
                if (fuel <= 0) return;

                // Gravitational Pull to the Right
                shipX = Math.min(94, shipX + pullStrength);
                document.getElementById('ship').style.left = shipX + "%";

                // Safe Zone is the first 30% of the bar
                const isSafe = (shipX <= 30);
                let dilation = isSafe ? 1 : 12; // Heavy penalty for being pulled toward the well
                
                document.getElementById('warningHeader').style.display = isSafe ? 'none' : 'block';

                playSound(1200);
                earthDays += dilation;
                document.getElementById('dayCounter').innerText = earthDays;
                document.getElementById('yearCounter').innerText = (earthDays / 365.25).toFixed(2);
                
                fuel -= 0.35; 
                document.getElementById('fuelFill').style.width = Math.max(0, fuel) + "%";
                
                if (earthDays % 10 === 0) {
                    document.getElementById('transmission').innerText = "> " + crewQuotes[Math.floor(Math.random()*crewQuotes.length)];
                }

                document.getElementById('waveBox').style.height = Math.min((earthDays/300)*100, 100) + "vh";

                if (fuel <= 0) {
                    document.getElementById('tarsDisplay').innerText = "TARS: Signal lost in Gargantua.";
                    document.getElementById('mainCard').style.filter = "grayscale(1) brightness(0.2)";
                }
            }, 1250);
        }

        function calculate() {
            const mins = document.getElementById('earthInput').value;
            const millerSecs = (mins / (RATIO * 60)) * 3600;
            document.getElementById('millerTime').innerText = millerSecs < 60 ? millerSecs.toFixed(4) + "s" : (millerSecs / 60).toFixed(2) + "m";
        }
    </script>
</body>
</html>
