<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GARGANTUA_OS // V.25</title>
    <style>
        :root { 
            --neon-blue: #00f3ff; --neon-pink: #ff0055; --terminal-green: #00ff41; 
            --tesseract-gold: #f4d03f; --bg: #020000;
        }
        
        body {
            background-color: var(--bg); color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; margin: 0;
            overflow: hidden; perspective: 1000px;
        }

        /* 3D Tesseract Unfolding Effect */
        .tesseract-warp {
            animation: unfold 4s forwards cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        @keyframes unfold {
            0% { transform: rotateY(0deg) rotateX(0deg) scale(1); }
            50% { transform: rotateY(45deg) rotateX(-20deg) scale(0.8); border-color: var(--tesseract-gold); }
            100% { transform: rotateY(0deg) rotateX(0deg) scale(1.5); opacity: 0; filter: brightness(3); }
        }

        .container {
            background: rgba(0, 0, 0, 0.98); padding: 1.2rem; 
            border: 1px solid var(--neon-blue); width: 88%; max-width: 450px; z-index: 10;
            transition: border 1s, box-shadow 1s;
        }

        #gameArea {
            margin-top: 10px; border: 1px double #444; height: 160px; position: relative;
            background: #000; overflow: hidden; touch-action: none;
        }
        
        #ship {
            position: absolute; left: 30%; top: 45%; width: 24px; height: 18px;
            background: #fff; clip-path: polygon(100% 40%, 0 0, 30% 50%, 0 100%, 100% 60%);
            transition: left 0.1s linear, top 0.1s linear; z-index: 5;
            box-shadow: 0 0 10px #fff;
        }

        .saboteur {
            position: absolute; width: 26px; height: 26px;
            background: var(--neon-pink); border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-pink); color: #fff;
            font-size: 7px; font-weight: bold; display: flex; 
            align-items: center; justify-content: center; border: 2px solid #fff;
        }

        #winScreen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #fff 0%, var(--tesseract-gold) 100%);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
            color: #000; text-align: center; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="winScreen">
        <h1 style="font-size: 3rem; margin:0;">STAY</h1>
        <p style="letter-spacing: 2px;">QUANTUM DATA TRANSMITTED</p>
        <p style="font-size: 0.8rem; margin-top: 20px;">Humanity has a new home.</p>
        <button onclick="location.reload()" style="padding:15px 30px; background:#000; color:#fff; border:none; margin-top:30px; font-family:inherit; font-weight:bold; cursor:pointer;">RE-ENTER WORMHOLE</button>
    </div>

    <div class="container" id="mainCard">
        <h1 id="headerTitle" style="font-size: 0.85rem; text-align: center; letter-spacing: 3px;">GARGANTUA_OS_V25</h1>
        
        <div id="tarsDisplay" style="font-size:0.55rem; color:var(--terminal-green); margin:8px 0; min-height: 24px;">TARS: "Data extraction in progress. Avoid Mann's sabotage."</div>
        
        <button class="btn-mission" id="startBtn" onclick="initiateMission()" style="background:var(--neon-pink); color:#fff; border:none; padding:15px; width:100%; font-weight:bold; cursor:pointer; font-family:inherit;">INITIATE MISSION</button>

        <div id="ui-elements" style="display:none">
            <div style="width: 100%; height: 4px; background: #333;"><div id="hullFill" style="width: 100%; height: 100%; background: var(--terminal-green); transition: 0.3s;"></div></div>
            <p style="font-size:0.4rem; margin:4px 0;">HULL_STABILITY: <span id="hullPct">100</span>%</p>

            <div class="result-box">
                <span id="millerTime" style="font-size: 1.8rem; color: #fff; display: block; text-align: center;">0.0000s</span>
                <div style="background: #111; height: 4px; margin: 8px 0;"><div id="fuelFill" style="width: 100%; height: 100%; background: var(--terminal-green);"></div></div>
                
                <div style="display:flex; justify-content:space-around; text-align:center;">
                    <div><span id="dayCounter" style="font-weight:bold;">0</span><br><span style="font-size:0.45rem">DAYS</span></div>
                    <div><span id="yearCounter" style="font-size:1.1rem; font-weight:bold;">0.00</span><br><span style="font-size:0.45rem">YEARS</span></div>
                </div>

                <div id="gameArea" onclick="handleInput(event)" ontouchstart="handleInput(event)">
                    <div id="ship"></div>
                    <div style="position:absolute; left:0; top:0; height:100%; width:20%; background:rgba(0,255,65,0.05); border-right:1px solid var(--terminal-green);"></div>
                </div>
                <div id="transmission" style="font-size:0.6rem; margin-top:10px; border-left:2px solid var(--neon-pink); padding-left:10px;">> SIGNAL_STABLE</div>
            </div>
        </div>
    </div>

    <script>
        const RATIO = 61320;
        let audioCtx, earthDays = 0, fuel = 100, hull = 100, missionActive = false;
        let shipX = 30, shipY = 45; 
        const saboteurs = [];

        function playSound(p, d=0.03) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'square'; o.frequency.value = p;
            g.gain.setValueAtTime(0.04, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function handleInput(e) {
            if (!missionActive) return;
            e.preventDefault();
            const rect = gameArea.getBoundingClientRect();
            const touchX = ((e.clientX || e.touches[0].clientX) - rect.left) / rect.width * 100;
            const touchY = ((e.clientY || e.touches[0].clientY) - rect.top) / rect.height * 100;
            if (touchX < shipX) shipX -= 12; else shipX += 4;
            if (touchY < shipY) shipY -= 15; else shipY += 15;
            updateShip();
            playSound(1800);
        }

        function updateShip() {
            shipX = Math.max(0, Math.min(94, shipX));
            shipY = Math.max(0, Math.min(85, shipY));
            document.getElementById('ship').style.left = shipX + "%";
            document.getElementById('ship').style.top = shipY + "%";
        }

        function initiateMission() {
            missionActive = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('ui-elements').style.display = 'block';
            
            const loop = setInterval(() => {
                if (fuel <= 0 || hull <= 0) {
                    clearInterval(loop);
                    document.getElementById('tarsDisplay').innerText = "TARS: Mission Failure. Gravity won.";
                    return;
                }

                shipX = Math.min(94, shipX + 4);
                updateShip();

                let dilation = (shipX > 20) ? Math.floor(Math.pow(1.08, shipX - 20) + 1) : 1;
                earthDays += dilation;
                let years = (earthDays / 365.25);
                
                document.getElementById('dayCounter').innerText = earthDays;
                document.getElementById('yearCounter').innerText = years.toFixed(2);
                
                fuel -= 0.5;
                document.getElementById('fuelFill').style.width = fuel + "%";

                if (years >= 80) {
                    clearInterval(loop);
                    triggerTesseract();
                }

                if (Math.random() > 0.7) spawnSaboteur();

                for (let i = saboteurs.length - 1; i >= 0; i--) {
                    let s = saboteurs[i]; s.x -= (10 + dilation * 0.5);
                    s.el.style.left = s.x + "%";
                    if (Math.abs(s.x - shipX) < 7 && Math.abs(s.y - shipY) < 14) {
                        hull -= 20;
                        shipX = Math.min(94, shipX + 30);
                        document.getElementById('hullFill').style.width = hull + "%";
                        document.getElementById('hullPct').innerText = hull;
                        playSound(300, 0.2); s.el.remove(); saboteurs.splice(i, 1);
                    } else if (s.x < -10) { s.el.remove(); saboteurs.splice(i, 1); }
                }
            }, 1250);
        }

        function spawnSaboteur() {
            const sab = document.createElement('div');
            sab.className = 'saboteur'; sab.innerText = 'MANN';
            sab.style.left = '110%'; sab.style.top = Math.random() * 85 + '%';
            document.getElementById('gameArea').appendChild(sab);
            saboteurs.push({el: sab, x: 110, y: parseFloat(sab.style.top)});
        }

        function triggerTesseract() {
            missionActive = false;
            const card = document.getElementById('mainCard');
            card.classList.add('tesseract-warp');
            document.getElementById('tarsDisplay').innerText = "TARS: EUREKA! DATA SENT!";
            playSound(2200, 2);
            setTimeout(() => {
                document.getElementById('winScreen').style.display = 'flex';
            }, 3500);
        }
    </script>
</body>
</html>
