<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GARGANTUA_OS // V.19</title>
    <style>
        :root { 
            --neon-blue: #00f3ff; --neon-pink: #ff0055; --terminal-green: #00ff41; --bg: #020205; 
        }
        
        body {
            background-color: var(--bg); color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; margin: 0;
            overflow: hidden; position: relative;
        }

        .wave-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 0vh;
            z-index: 0; pointer-events: none; transition: height 1.25s linear;
        }
        .liquid {
            position: absolute; bottom: 0; left: -50%; width: 200%; height: 600px;
            background: rgba(0, 243, 255, 0.1); border-top: 3px solid var(--neon-blue);
            border-radius: 41%; animation: drift 7s infinite linear;
        }
        @keyframes drift { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container {
            background: rgba(5, 5, 12, 0.98); padding: 1.2rem; 
            border: 2px solid var(--neon-blue); width: 88%; max-width: 450px; z-index: 10;
            position: relative; box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        #warningHeader {
            background: var(--neon-pink); color: #fff; font-weight: bold;
            font-size: 0.7rem; text-align: center; padding: 5px; margin-bottom: 10px;
            display: none;
        }

        #gameArea {
            margin-top: 10px; border: 1px dashed #444; height: 120px; position: relative;
            background: #000; overflow: hidden; touch-action: none;
        }
        
        #ship {
            position: absolute; left: 40%; top: 45%; width: 24px; height: 18px;
            background: #fff; clip-path: polygon(100% 40%, 0 0, 30% 50%, 0 100%, 100% 60%);
            transition: left 0.1s linear, top 0.1s linear; z-index: 5;
        }

        .safe-zone {
            position: absolute; left: 0; top: 0; height: 100%; width: 25%;
            background: rgba(0, 255, 65, 0.1); border-right: 2px solid var(--terminal-green);
        }

        /* Saboteur Obstacle Style */
        .saboteur {
            position: absolute; width: 20px; height: 20px;
            background: var(--neon-pink); clip-path: circle(50% at 50% 50%);
            box-shadow: 0 0 10px var(--neon-pink); border: 1px solid #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 8px; color: #000; font-weight: bold;
        }

        #transmission { 
            height: 60px; font-size: 0.65rem; color: #ccc; 
            margin-top: 10px; border-left: 2px solid var(--neon-pink); padding-left: 10px;
            display: flex; align-items: center; overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="wave-container" id="waveBox"><div class="liquid"></div></div>

    <div class="container" id="mainCard">
        <div id="warningHeader">DILATION_FACTOR: <span id="dilationDisplay">1</span>x</div>
        
        <h1 style="font-size: 1rem; text-align: center; letter-spacing: 5px;">MILLER_LINK</h1>
        <div id="tarsDisplay" style="font-size:0.55rem; color:var(--terminal-green); margin:8px 0; min-height: 24px;">TARS: "Saboteur detected! Dodge the Mann icons!"</div>
        
        <button class="btn-mission" id="startBtn" onclick="initiateMission()" style="background:var(--neon-pink); color:#fff; border:none; padding:15px; width:100%; font-weight:bold; font-family:inherit; margin-bottom:10px;">INITIATE LANDING</button>

        <div id="ui-elements" style="display:none">
            <input type="number" id="earthInput" style="width:100%; padding:10px; background:#000; border:1px solid var(--neon-blue); color:var(--neon-blue); margin-bottom:10px; font-family:inherit;" placeholder="EARTH MINUTES" oninput="calculate()">

            <div class="result-box">
                <span id="millerTime" style="font-size: 1.8rem; color: #fff; display: block; text-align: center;">0.0000s</span>
                <div style="background: #111; height: 6px; margin: 10px 0;"><div id="fuelFill" style="width: 100%; height: 100%; background: var(--terminal-green);"></div></div>
                
                <div style="display:flex; justify-content:space-around; text-align:center;">
                    <div><span id="dayCounter" style="font-size:1.1rem; font-weight:bold;">0</span><br><span style="font-size:0.4rem">DAYS_LOST</span></div>
                    <div><span id="yearCounter" style="font-size:1.1rem; font-weight:bold;">0.00</span><br><span style="font-size:0.4rem">YEARS_LOST</span></div>
                </div>

                <div id="gameArea">
                    <div class="safe-zone"></div>
                    <div id="ship"></div>
                </div>

                <div id="transmission">> COMMS_OFFLINE</div>
            </div>
        </div>
    </div>

    <script>
        const RATIO = 61320;
        let audioCtx, earthDays = 0, fuel = 100, missionActive = false;
        let shipX = 40, shipY = 45; 
        const saboteurs = [];

        function playSound(p) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'square'; o.frequency.value = p;
            g.gain.setValueAtTime(0.04, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.03);
        }

        const gameArea = document.getElementById('gameArea');
        
        function thrust(e) {
            if (!missionActive) return;
            e.preventDefault();
            shipX = Math.max(0, shipX - 10); // Pulse Left
            document.getElementById('ship').style.left = shipX + "%";
            playSound(1800);
        }

        gameArea.addEventListener('touchstart', thrust, {passive: false});
        gameArea.addEventListener('mousedown', thrust);

        function spawnSaboteur() {
            if (!missionActive) return;
            const sab = document.createElement('div');
            sab.className = 'saboteur';
            sab.innerText = 'MANN';
            sab.style.right = '-20px';
            sab.style.top = Math.random() * 80 + '%';
            gameArea.appendChild(sab);
            saboteurs.push({el: sab, x: 110, y: parseFloat(sab.style.top)});
        }

        function initiateMission() {
            missionActive = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('ui-elements').style.display = 'block';
            
            setInterval(() => {
                if (fuel <= 0) return;

                // Gravity Pulls Right
                shipX = Math.min(94, shipX + 3);
                document.getElementById('ship').style.left = shipX + "%";

                // EXPONENTIAL DILATION CALCULATION
                // Dilation starts at 1x in green zone (0-25%) and increases exponentially to 50x near singularity
                let dilation = 1;
                if (shipX > 25) {
                    dilation = Math.floor(Math.pow(1.05, shipX - 25) + 1);
                }
                
                const warn = document.getElementById('warningHeader');
                document.getElementById('dilationDisplay').innerText = dilation;
                warn.style.display = dilation > 1 ? 'block' : 'none';

                playSound(1200);
                earthDays += dilation;
                document.getElementById('dayCounter').innerText = earthDays;
                document.getElementById('yearCounter').innerText = (earthDays / 365.25).toFixed(2);
                
                fuel -= 0.35; 
                document.getElementById('fuelFill').style.width = Math.max(0, fuel) + "%";
                
                // Spawn Mann every 5 ticks
                if (earthDays % 5 === 0) spawnSaboteur();

                // Update Saboteurs
                for (let i = saboteurs.length - 1; i >= 0; i--) {
                    let s = saboteurs[i];
                    s.x -= 8; // Move saboteur left
                    s.el.style.right = (100 - s.x) + "%";
                    
                    // Collision Detection
                    if (s.x > shipX - 5 && s.x < shipX + 5 && Math.abs(s.y - shipY) < 15) {
                        shipX = Math.min(94, shipX + 25); // KNOCKBACK Deeper into Well
                        playSound(400);
                        s.el.remove();
                        saboteurs.splice(i, 1);
                    } else if (s.x < -10) {
                        s.el.remove();
                        saboteurs.splice(i, 1);
                    }
                }

                document.getElementById('waveBox').style.height = Math.min((earthDays/400)*100, 100) + "vh";
            }, 1250);
        }

        function calculate() {
            const mins = document.getElementById('earthInput').value;
            const millerSecs = (mins / (RATIO * 60)) * 3600;
            document.getElementById('millerTime').innerText = millerSecs < 60 ? millerSecs.toFixed(4) + "s" : (millerSecs / 60).toFixed(2) + "m";
        }
    </script>
</body>
</html>
